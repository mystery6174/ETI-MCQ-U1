    <script>
        // Note: The correct answer is at index 0 in the source, but the JavaScript shuffles them randomly at runtime!
        const questions = [

  // ── 1. Introduction to AI ──────────────────────────────────────────────────
  { q: "What is Artificial Intelligence (AI)?", options: ["Machines performing tasks requiring human intelligence", "A hardware cooling component", "A programming language", "A database system"], a: 0, e: "AI generates machines capable of performing tasks that normally require human intelligence such as learning, reasoning, problem-solving, and decision-making." },

  { q: "Which of the following is a key application of AI?", options: ["Manual data entry", "Self-driving cars", "Mechanical welding", "Cable networking"], a: 1, e: "Key AI applications include self-driving cars, personalized recommendations, medical diagnosis, and voice recognition." },

  { q: "AI works by enabling computer systems to:", options: ["Replace all human jobs", "Perceive their environment, understand patterns, and take actions to achieve goals", "Only store data", "Only perform arithmetic"], a: 1, e: "AI works by enabling computer systems to perceive their environment, understand patterns in data, and take actions to achieve specific goals." },

  { q: "Which AI concept enables computers to understand and process human language?", options: ["Computer Vision", "Robotics", "Natural Language Processing (NLP)", "Expert Systems"], a: 2, e: "NLP is AI's ability to understand, interpret, and generate human language. Examples include Google Translate, ChatGPT, and Siri." },

  { q: "Computer Vision in AI is used for:", options: ["Database management", "Facial recognition, medical imaging, and traffic monitoring", "Writing code automatically", "Managing cloud servers"], a: 1, e: "Computer Vision enables machines to see, identify, and process images or videos. It is used in facial recognition, medical imaging, traffic monitoring, and self-driving cars." },

  { q: "Which AI concept mimics human experts' decision-making using if-then rules?", options: ["Neural Networks", "Reinforcement Learning", "Expert Systems", "Computer Vision"], a: 2, e: "Expert Systems are AI programs that mimic human experts' decision-making using if-then rules and knowledge bases, e.g., medical diagnosis systems." },

  { q: "Sophia the humanoid robot is an example of which AI concept?", options: ["Expert Systems", "Robotics", "NLP", "Narrow AI"], a: 1, e: "Robotics combines AI with mechanical systems to create intelligent robots. Sophia is an example of a humanoid robot that can sense, act, and make decisions autonomously." },

  { q: "Neural Networks are inspired by:", options: ["The structure of the internet", "The human brain", "Electrical circuits", "Database schemas"], a: 1, e: "Neural Networks are inspired by the human brain. They consist of neurons (nodes) arranged in layers and form the foundation of deep learning." },

  { q: "AlphaGo beating human champions in Go is an example of:", options: ["Supervised Learning", "Expert Systems", "Reinforcement Learning", "NLP"], a: 2, e: "AlphaGo (Google DeepMind) uses Reinforcement Learning — training AI agents by giving rewards and penalties — to learn optimal strategies." },

  { q: "Which of the following is NOT listed as a key AI concept?", options: ["Machine Learning", "Deep Learning", "Blockchain", "Natural Language Processing"], a: 2, e: "The key AI concepts described in the unit are Machine Learning, Deep Learning, NLP, Computer Vision, Robotics, Expert Systems, Neural Networks, and Reinforcement Learning. Blockchain is not one of them." },

  // ── 2. Scope of AI ────────────────────────────────────────────────────────
  { q: "In which sector does AI help with early disease diagnosis and personalized treatment plans?", options: ["Agriculture", "Finance", "Healthcare", "Entertainment"], a: 2, e: "In Healthcare, AI assists with early disease diagnosis, personalized treatment plans, AI-powered surgical robots, and virtual nursing assistants." },

  { q: "Which AI career role focuses on ethical aspects of AI development?", options: ["Data Scientist", "ML Engineer", "AI Ethics Analyst", "Database Administrator"], a: 2, e: "AI Ethics Analyst is a career opportunity created by AI's wide-reaching impact, focusing on ensuring ethical practices in AI." },

  { q: "AI in the Retail & E-commerce sector is used for:", options: ["Crop monitoring", "Personalized shopping experiences and optimized inventory management", "Surgical assistance", "Traffic management"], a: 1, e: "In Retail & E-commerce, AI provides personalized shopping experiences, optimized inventory management, and AI-driven recommendation engines." },

  { q: "Predictive maintenance and quality control are key AI applications in which sector?", options: ["Education", "Manufacturing", "Entertainment", "Legal"], a: 1, e: "In Manufacturing, AI is used for predictive maintenance, quality control, automation of assembly lines, and supply chain optimization." },

  { q: "AI in Agriculture helps with:", options: ["Fraud detection", "Crop health monitoring, precision farming, and weather forecasting", "Surgical precision", "Dynamic pricing"], a: 1, e: "AI helps with crop health monitoring, precision farming, and weather forecasting to improve yields and resource use in Agriculture." },

  // ── 3. Types of AI ────────────────────────────────────────────────────────
  { q: "Which AI type is designed to perform specific, narrowly defined tasks and cannot go beyond its programmed capabilities?", options: ["AGI", "ASI", "Narrow AI (Weak AI)", "Self-Aware AI"], a: 2, e: "Narrow AI (Weak AI) is designed to perform specific tasks like Siri or AlphaGo and cannot perform beyond its programmed capabilities." },

  { q: "Artificial General Intelligence (AGI) is:", options: ["Currently widely deployed", "A theoretical stage where machines possess human-like intelligence", "A type of database", "A cybersecurity tool"], a: 1, e: "AGI is a theoretical stage where machines possess human-like intelligence capable of performing any intellectual task a human can. It does not currently exist." },

  { q: "Artificial Superintelligence (ASI) is best described as:", options: ["A currently available AI product", "A hypothetical future AI that surpasses human intelligence", "A type of Narrow AI", "An expert system"], a: 1, e: "ASI is a hypothetical future stage where AI capabilities surpass human intelligence, often depicted in science fiction." },

  { q: "Which functional AI type has NO memory and acts only in the present?", options: ["Limited Memory AI", "Theory of Mind AI", "Self-Aware AI", "Reactive Machines"], a: 3, e: "Reactive Machines are the most basic form of AI. They have no memory and cannot use past experiences — they only react to current situations." },

  { q: "Chatbots and virtual assistants often use which type of functional AI?", options: ["Reactive Machines", "Self-Aware AI", "Limited Memory AI", "Theory of Mind AI"], a: 2, e: "Limited Memory AI systems can store and use past data to make more informed decisions. Chatbots and virtual assistants often use this type." },

  { q: "Theory of Mind AI is described as:", options: ["Currently widely deployed", "A basic reactive system", "A hypothetical AI that understands beliefs, emotions, and needs of others", "The same as Narrow AI"], a: 2, e: "Theory of Mind AI is a hypothetical, advanced form of AI that can understand and remember beliefs, emotions, and needs of others, similar to how humans do." },

  { q: "Self-Aware AI would possess:", options: ["Only text generation ability", "True consciousness, emotions, desires, and self-awareness", "Basic if-then rule processing", "Speech recognition only"], a: 1, e: "Self-Aware AI is the most complex and currently hypothetical type of AI that would possess true consciousness, emotions, desires, and self-awareness akin to human consciousness." },

  { q: "AI types based on human imitation/capabilities include all EXCEPT:", options: ["Narrow AI", "Artificial General Intelligence", "Reactive Machines", "Artificial Superintelligence"], a: 2, e: "Reactive Machines is a type based on functionality, not on human imitation. The human imitation types are Narrow AI, AGI, and ASI." },

  // ── 4. Applications of AI ─────────────────────────────────────────────────
  { q: "Which virtual assistant uses AI to understand and respond to voice commands?", options: ["Google Search", "Microsoft Excel", "Siri / Alexa / Google Assistant", "Adobe Photoshop"], a: 2, e: "Siri, Alexa, and Google Assistant are virtual assistants that use AI to understand and respond to voice commands." },

  { q: "Streaming services like Netflix use AI for:", options: ["Cybersecurity", "Personalized content recommendations", "Manufacturing automation", "Legal contract analysis"], a: 1, e: "Streaming services use AI to suggest products and content through personalized recommendation systems." },

  { q: "AI in cybersecurity is used to:", options: ["Generate music", "Scan networks and data to identify and protect against threats", "Schedule meetings", "Design product packaging"], a: 1, e: "AI tools in Cybersecurity scan networks and data to identify and protect against threats and cyberattacks." },

  { q: "Self-driving cars use AI and ML algorithms for:", options: ["Content moderation", "Navigating and operating without human intervention", "Fraud detection", "Medical imaging"], a: 1, e: "Autonomous Vehicles use AI and machine learning algorithms to navigate and operate without human intervention." },

  { q: "AI in the Legal sector is used for:", options: ["Crop yield prediction", "Automating contract analysis and legal research", "Designing robots", "Music generation"], a: 1, e: "AI automates contract analysis and assists with legal research, making the process faster and more efficient." },

  // ── 5. Machine Learning ───────────────────────────────────────────────────
  { q: "Machine Learning (ML) is best defined as:", options: ["A hardware component", "A field of AI where systems learn from data to identify patterns and make predictions without being explicitly programmed", "A type of database query", "A network protocol"], a: 1, e: "ML is a field of AI that enables computer systems to learn from data, identify patterns, and make decisions without being explicitly programmed for every scenario." },

  { q: "Which is the fundamental idea behind Machine Learning?", options: ["Computers follow hand-coded rules only", "Computers can learn from data rather than being programmed for every scenario", "AI replaces all databases", "Networks run faster with ML"], a: 1, e: "The fundamental idea of ML is that computers can learn from data, rather than being programmed for every specific scenario." },

  { q: "ML systems improve their performance with:", options: ["More hardware only", "Increased experience (more data) and repeated use", "Manual updates by programmers", "Reduced internet speed"], a: 1, e: "ML systems improve their performance and accuracy with increased experience (more data) and repeated use — this is the self-improvement characteristic." },

  { q: "Supervised Learning trains a model on:", options: ["Unlabeled data", "Labeled data where each data point has a known output", "Random data", "Only images"], a: 1, e: "Supervised Learning trains a model on a labeled dataset where each data point has a corresponding output or label, allowing it to make predictions on new data." },

  { q: "Predicting house prices is an example of which ML type?", options: ["Unsupervised Learning", "Reinforcement Learning", "Supervised Learning (Regression)", "Semi-Supervised Learning"], a: 2, e: "Predicting house prices is a regression task — a type of Supervised Learning where the model predicts a continuous output value." },

  { q: "Unsupervised Learning works with:", options: ["Labeled data", "Reward-based signals", "Unlabeled data to discover hidden patterns", "Pre-programmed rules"], a: 2, e: "Unsupervised Learning works with unlabeled data. The objective is to discover hidden patterns, structures, or relationships without prior knowledge of outcomes." },

  { q: "Which ML type focuses on an agent learning to make decisions through interaction with an environment?", options: ["Supervised Learning", "Unsupervised Learning", "Reinforcement Learning", "Semi-Supervised Learning"], a: 2, e: "Reinforcement Learning focuses on an agent learning to make decisions by interacting with an environment, receiving rewards or penalties based on actions." },

  { q: "In Reinforcement Learning, the agent's objective is to:", options: ["Minimize data usage", "Maximize cumulative rewards over time", "Label datasets", "Cluster data into groups"], a: 1, e: "The agent's objective in Reinforcement Learning is to learn a policy that maximizes cumulative rewards over time." },

  { q: "Semi-Supervised Learning is particularly useful when:", options: ["All data is labeled", "Labeled data is expensive or time-consuming to obtain", "Only images are used", "The task involves only clustering"], a: 1, e: "Semi-Supervised Learning is useful when obtaining labeled data is expensive or time-consuming, allowing the model to leverage large amounts of unlabeled data." },

  { q: "Which ML application involves platforms like Netflix and Spotify?", options: ["Autonomous vehicles", "Recommendation Systems", "Fraud detection", "Crop monitoring"], a: 1, e: "Recommendation Systems on platforms like Netflix, Amazon, and Spotify use ML to suggest content or products based on user preferences and past behavior." },

  { q: "ML in Cybersecurity is used for:", options: ["Music generation", "Real-time threat detection and anomaly identification in network traffic", "Crop yield prediction", "Image generation"], a: 1, e: "ML algorithms in Cybersecurity are used for real-time threat detection, anomaly identification in network traffic, and predicting potential vulnerabilities." },

  { q: "ML application in Finance includes:", options: ["Crop health monitoring", "Fraud detection, algorithmic trading, and credit scoring", "Medical imaging analysis", "Content moderation"], a: 1, e: "In Finance, ML is used for fraud detection, algorithmic trading, credit scoring, loan risk assessment, and financial forecasting." },

  // ── 6. Deep Learning ──────────────────────────────────────────────────────
  { q: "Deep Learning is a subfield of:", options: ["Only Hardware Engineering", "AI and ML, focusing on artificial neural networks", "Database Management", "Network Security"], a: 1, e: "Deep Learning is a subfield of AI and ML that focuses on algorithms inspired by the structure and function of the human brain — artificial neural networks." },

  { q: "What do deep learning models learn automatically from raw data?", options: ["Database schemas", "Features, without manual feature engineering", "Network topologies", "Legal rules"], a: 1, e: "Deep learning models learn to automatically extract features from raw data (images, text, audio) without the need for manual feature engineering." },

  { q: "In image recognition using Deep Learning, deeper layers detect:", options: ["Edges", "Shapes", "Complete objects", "Pixels only"], a: 2, e: "In image recognition, early layers detect edges, middle layers detect shapes, and deeper layers detect complete objects." },

  { q: "The term 'deep' in Deep Learning refers to:", options: ["The depth of the training dataset", "Networks with many hidden layers", "The depth of programming knowledge required", "The size of the GPU"], a: 1, e: "The term 'deep' refers to neural networks with many hidden layers, where each layer progressively learns more abstract representations." },

  { q: "Which hardware is commonly required for Deep Learning due to its high computational needs?", options: ["Standard CPUs", "GPUs (Graphics Processing Units)", "RAM modules only", "Network routers"], a: 1, e: "Deep Learning requires high computational power, often GPUs, because of the massive matrix calculations involved in training neural networks." },

  { q: "Which of the following is a Deep Learning application in Healthcare?", options: ["Algorithmic trading", "Detecting diseases from X-rays, MRIs, and CT scans", "Crop yield prediction", "Dynamic pricing"], a: 1, e: "In Healthcare, Deep Learning is used for medical imaging — detecting tumors, fractures, or diseases from X-rays, MRIs, and CT scans." },

  { q: "Deepfakes are generated using which technology?", options: ["Expert Systems", "Reactive Machines", "Generative AI / Deep Learning", "SQL Databases"], a: 2, e: "Deepfakes — realistic face-swapping videos — are generated using Deep Learning under the Generative AI category." },

  { q: "Which Deep Learning application converts speech to text?", options: ["Object Detection", "Speech Recognition", "Sentiment Analysis", "Image Classification"], a: 1, e: "Speech Recognition converts speech to text (e.g., voice typing) and is a key Deep Learning application in Speech & Audio Processing." },

  // ── 7. Neural Networks ────────────────────────────────────────────────────
  { q: "A Neural Network is a computational model motivated by:", options: ["Electrical circuit design", "How the human brain works", "Relational database structure", "Network routing algorithms"], a: 1, e: "A Neural Network is a computational model motivated by how the human brain works and is the necessary building block of Deep Learning." },

  { q: "The Input Layer of a neural network:", options: ["Produces the final prediction", "Receives raw data such as image pixels, text, or numerical values", "Adjusts weights and biases", "Applies the loss function"], a: 1, e: "The Input Layer receives raw data (e.g., image pixels, text, numerical values) and passes it forward into the network." },

  { q: "What do Hidden Layers in a neural network do?", options: ["Store the training data", "Perform computations applying weights, biases, and activation functions", "Only receive input data", "Output the final result directly"], a: 1, e: "Hidden Layers perform computations — each neuron applies a weighted sum of inputs, adds a bias, and passes it through an activation function." },

  { q: "What is the role of an activation function in a neural network?", options: ["To store data", "To introduce non-linearity into the computation", "To manage hardware resources", "To set the learning rate"], a: 1, e: "An activation function introduces non-linearity into the neuron's computation, enabling the network to learn complex patterns." },

  { q: "In Forward Propagation, data flows:", options: ["From output back to input", "From input through hidden layers to produce an output", "Randomly through the network", "Only through the output layer"], a: 1, e: "In Forward Propagation, data flows from the input layer through hidden layers and generates an output — the network makes a prediction." },

  { q: "What does Backpropagation do in neural network training?", options: ["Feeds data into the input layer", "Sends the error back through the network to update weights and biases", "Generates new training data", "Reduces the number of layers"], a: 1, e: "Backpropagation sends the error back through the network to update weights and biases. Optimization algorithms like Gradient Descent are then used to minimize the error." },

  { q: "Which optimization algorithm is commonly used with Backpropagation to minimize error?", options: ["Binary Search", "Gradient Descent", "Bubble Sort", "Dijkstra's Algorithm"], a: 1, e: "Gradient Descent is used alongside Backpropagation to adjust weights and biases so that the network's prediction error is minimized." },

  { q: "Neural Networks are used in all of the following EXCEPT:", options: ["Speech recognition", "Handwriting recognition", "Image processing", "Managing SQL transactions"], a: 3, e: "Neural Networks are used in speech recognition, handwriting recognition, and image processing. Managing SQL transactions is a database function, not a neural network application." },

  // ── 8. AI vs ML vs DL ────────────────────────────────────────────────────
  { q: "Which is the broadest concept among AI, ML, and DL?", options: ["Machine Learning", "Deep Learning", "Artificial Intelligence", "Neural Networks"], a: 2, e: "AI is the broadest concept — it encompasses machines with intelligence. ML is a subset of AI, and DL is a subset of ML." },

  { q: "In terms of feature extraction, how does Deep Learning differ from traditional ML?", options: ["DL requires fully manual feature extraction", "DL automatically extracts features; traditional ML requires manual or partial feature extraction", "There is no difference", "DL cannot handle unstructured data"], a: 1, e: "DL performs automatic feature extraction through its deep layers, whereas traditional ML requires manual (partially automated) feature extraction." },

  { q: "Email spam filters and product recommendations are examples of:", options: ["Deep Learning", "Machine Learning", "Generative AI", "Expert Systems"], a: 1, e: "Email spam filters and product recommendations are classic examples of Machine Learning applications." },

  { q: "Self-driving cars, image recognition, and advanced voice assistants are examples of:", options: ["Narrow AI only", "Traditional ML", "Deep Learning", "Expert Systems"], a: 2, e: "Self-driving cars, image recognition, and advanced voice assistants are listed as Deep Learning examples due to their complexity and use of neural networks." },

  // ── 9. Generative AI ──────────────────────────────────────────────────────
  { q: "Generative AI (GenAI) primarily focuses on:", options: ["Only analyzing existing data", "Creating new content — text, images, audio, video, code — that resembles human-made output", "Managing relational databases", "Replacing operating systems"], a: 1, e: "GenAI is a type of AI that focuses on creating new content that looks or sounds like it was created by humans, rather than just analyzing data." },

  { q: "Which technology powers most modern large language models like GPT?", options: ["GANs", "VAEs", "Transformers", "Diffusion Models"], a: 2, e: "Transformers power large language models (LLMs) like GPT for text. They use a self-attention mechanism to understand context and relationships in sequential data." },

  { q: "GANs (Generative Adversarial Networks) are best suited for:", options: ["Text translation", "Generating realistic images and videos", "Predicting stock prices", "Network routing"], a: 1, e: "GANs are good at generating realistic images and videos and are a key technology behind Generative AI." },

  { q: "Diffusion Models like Stable Diffusion are primarily used for:", options: ["High-quality image generation", "Database indexing", "Speech-to-text conversion", "Code compilation"], a: 0, e: "Diffusion Models are used for high-quality image generation (e.g., Stable Diffusion, DALL·E)." },

  { q: "VAEs (Variational Autoencoders) are used for:", options: ["Video streaming", "Structured data and reconstruction tasks", "Network security", "Cloud storage"], a: 1, e: "VAEs (Variational Autoencoders) are used for structured data and reconstruction tasks in Generative AI." },

  { q: "The Transformer model was introduced in:", options: ["2015", "2017", "2019", "2021"], a: 1, e: "The Transformer is a deep learning model introduced in 2017, designed to handle sequential data more efficiently than older models like RNNs and LSTMs." },

  { q: "What does the Self-Attention mechanism in Transformers allow the model to do?", options: ["Store images", "Weigh the importance of different words in the input when processing each word", "Generate hardware instructions", "Compress audio files"], a: 1, e: "The Self-Attention mechanism allows the model to weigh the importance of different words in the input sequence when processing each word, creating a rich contextual representation." },

  { q: "Multi-Head Attention in Transformers runs the self-attention mechanism:", options: ["Once sequentially", "In parallel multiple times to capture different types of relationships", "Only on the output layer", "Only for images"], a: 1, e: "Multi-Head Attention runs the self-attention mechanism in parallel multiple times (heads) to capture different types of relationships and contextual information between words." },

  { q: "Positional Encoding in Transformers provides information about:", options: ["The size of the dataset", "The position of each token in the sequence", "The GPU memory usage", "The number of hidden layers"], a: 1, e: "Positional encodings are added to embeddings because the self-attention mechanism doesn't consider word order — they provide position information for each token." },

  { q: "The Encoder in a Transformer architecture:", options: ["Generates the final output sequence", "Processes the input sequence and creates a contextualized representation", "Only stores training data", "Applies gradient descent"], a: 1, e: "The Encoder processes the input sequence and creates a contextualized representation, which the Decoder then uses to generate the output." },

  { q: "Which of the following is an example of Text Generation by Generative AI?", options: ["DALL·E", "Midjourney", "ChatGPT", "Spotify"], a: 2, e: "ChatGPT is an example of Text Generation — models like GPT create human-like text for articles, creative writing, code, and more." },

  { q: "DALL·E and Midjourney are examples of which type of Generative AI?", options: ["Text Generation", "Music and Audio Generation", "Image Generation", "Video Generation"], a: 2, e: "DALL·E and Midjourney are Image Generation systems that produce realistic or artistic images from text descriptions." },

  { q: "In which GenAI application does AI generate drug-related protein sequences?", options: ["Content Creation", "Finance", "Healthcare & Life Sciences", "Gaming"], a: 2, e: "In Healthcare & Life Sciences, Generative AI accelerates drug discovery by creating new protein sequences and synthetic gene sequences." },

  // ── 10. Vibe Coding ───────────────────────────────────────────────────────
  { q: "Vibe Coding is defined as:", options: ["Traditional manual coding", "AI-powered development where a human guides an LLM to generate, refine, and debug code through a conversational process", "A type of database design", "A cybersecurity practice"], a: 1, e: "Vibe coding is an AI-powered development practice where the developer guides an LLM via natural language, shifting focus from writing code line-by-line to articulating goals." },

  { q: "In Vibe Coding, the AI acts as a:", options: ["Database administrator", "Co-pilot handling complex coding tasks", "Network firewall", "Hardware engineer"], a: 1, e: "In Vibe Coding, the AI acts as a 'co-pilot,' handling intricate details of code while the human focuses on the big picture and overall vision of the software." },

  { q: "Which platform is described as an 'AI-first code editor' popular for Vibe Coding?", options: ["Replit", "Cursor", "VS Code", "Eclipse"], a: 1, e: "Cursor is an AI-first code editor that serves as a full-stack ideation and coding environment, making it a popular tool for vibe coding." },

  { q: "Replit is described as:", options: ["A hardware design tool", "An online coding platform offering AI tools to generate and run applications", "A network monitoring tool", "A database management system"], a: 1, e: "Replit is an online coding platform that offers AI tools to generate and run applications, providing a simple way to start vibe coding." },

  { q: "Which of the following is a key aspect of Vibe Coding?", options: ["Writing every line of code manually", "Iterative process of prompting, AI-generated code, testing, and refined feedback", "Only using assembly language", "Avoiding AI tools entirely"], a: 1, e: "Vibe Coding involves an iterative process: prompting the AI, reviewing AI-generated code, testing, and providing refined feedback — allowing for rapid iteration." },

  // ── 11. Agentic AI ────────────────────────────────────────────────────────

        let currentIdx = 0, score = 0, answered = false;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const totalQuestions = questions.length;
            document.getElementById('progress-text').innerText = `Question 1/${totalQuestions}`;
            document.getElementById('final-total').innerText = `Correct out of ${totalQuestions}`;
            
            // Randomize options for each question initially
            questions.forEach(q => {
                const originalCorrect = q.options[q.a];
                
                // Fisher-Yates shuffle for options
                for (let i = q.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
                }
                
                // Find new index of the correct answer
                q.a = q.options.indexOf(originalCorrect);
            });

            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            const totalQuestions = questions.length;
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${totalQuestions}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / totalQuestions) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50 font-medium text-sm text-slate-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                container.appendChild(btn);
            });
            
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            answered = false;
        }

        function selectOption(idx, btn) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentIdx];
            const allBtns = document.querySelectorAll('#options-container button');
            
            if (idx === q.a) {
                score++;
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                allBtns[q.a].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            exp.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
    </script>
